apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: staging

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 622488711452.dkr.ecr.us-east-2.amazonaws.com/capstone-frontend:60c40dec790676e02cfa8721fe80224505eaff17

        imagePullPolicy: Always

        ports:
        - containerPort: 80