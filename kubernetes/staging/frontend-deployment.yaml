apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: staging

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 622488711452.dkr.ecr.us-east-2.amazonaws.com/capstone-frontend:843c0846cb6de0e9ac1ca5d10fa9be7877de2a2a

        imagePullPolicy: Always

        ports:
        - containerPort: 80