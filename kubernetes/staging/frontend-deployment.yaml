apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: frontend
  namespace: staging

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    blueGreen:
      activeService: frontend-active
      previewService: frontend-preview
      autoPromotionEnabled: false    

  template:
    metadata:
      labels:
        app: frontend

  spec:
  containers:
    - name: frontend
      image: 622488711452.dkr.ecr.us-east-2.amazonaws.com/capstone-frontend:92a870cc76bba3c61d1aac40839c7a63415311ad
      imagePullPolicy: Always
      ports:
        - containerPort: 80