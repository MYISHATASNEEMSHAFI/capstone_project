apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: frontend
  namespace: staging

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    blueGreen:
      activeService: frontend-active
      previewService: frontend-preview
      autoPromotionEnabled: false    

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 622488711452.dkr.ecr.us-east-2.amazonaws.com/capstone-frontend:cba1b0bc5f81b7a883318bf2d496b55d00e5a08f

        imagePullPolicy: Always

        ports:
        - containerPort: 80