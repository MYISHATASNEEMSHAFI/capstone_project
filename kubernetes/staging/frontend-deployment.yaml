apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: frontend
  namespace: staging

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    blueGreen:
      activeService: frontend-active
      previewService: frontend-preview
      autoPromotionEnabled: false    

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
       - name: frontend
         image: 622488711452.dkr.ecr.us-east-2.amazonaws.com/capstone-frontend:dd20e9007ce0d4638384c7200932e88ca5f3f320
         imagePullPolicy: Always
         ports:
          - containerPort: 80