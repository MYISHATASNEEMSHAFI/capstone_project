apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      
      - name: frontend
        image: capstone-frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 80