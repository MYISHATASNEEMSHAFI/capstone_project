name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:

      #################################################
      # Checkout Repository
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #################################################
      # Install Kustomize
      #################################################

      - name: Install Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      #################################################
      # Read Backend Image
      #################################################

      - name: Read Backend Image
        run: |
          BACKEND_IMAGE=$(kustomize build kubernetes/staging | awk '/image:/ {print $2; exit}')

          if [ -z "$BACKEND_IMAGE" ]; then
            echo "Backend image not found!"
            exit 1
          fi

          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      #################################################
      # Read Frontend Image
      #################################################

      - name: Read Frontend Image
        run: |
          FRONTEND_IMAGE=$(kustomize build kubernetes/staging | awk '/capstone-frontend/ {print $2; exit}')

          if [ -z "$FRONTEND_IMAGE" ]; then
            echo "Frontend image not found!"
            exit 1
          fi

          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      #################################################
      # Update Production Kustomization
      #################################################

      - name: Update Production Images
        run: |
          cd kubernetes/production

          kustomize edit set image capstone-backend=$BACKEND_IMAGE

          kustomize edit set image capstone-frontend=$FRONTEND_IMAGE

      #################################################
      # Commit Changes
      #################################################

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kubernetes/production/kustomization.yaml

          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "Promote staging images to production"

          git push origin master