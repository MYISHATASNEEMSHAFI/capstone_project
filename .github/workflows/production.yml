name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################################
      # Read image tags from staging manifests
      ########################################################

      - name: Read Backend Tag
        run: |
          BACKEND_IMAGE=$(grep "image:" kubernetes/staging/backend-deployment.yaml | awk '{print $2}')
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Read Frontend Tag
        run: |
          FRONTEND_IMAGE=$(grep "image:" kubernetes/staging/frontend-deployment.yaml | awk '{print $2}')
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      ########################################################
      # Update production manifests
      ########################################################

      - name: Update Backend Manifest
        run: |
          sed -i "s|image:.*|image: ${BACKEND_IMAGE}|g" kubernetes/production/backend-deployment.yaml

      - name: Update Frontend Manifest
        run: |
          sed -i "s|image:.*|image: ${FRONTEND_IMAGE}|g" kubernetes/production/frontend-deployment.yaml

      ########################################################
      # Commit changes
      ########################################################

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kubernetes/production/backend-deployment.yaml
          git add kubernetes/production/frontend-deployment.yaml

          git commit -m "Promote staging images to production" || echo "No changes"

          git pull --rebase origin master
          git push origin HEAD:master