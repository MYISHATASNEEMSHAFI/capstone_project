name: Build, Push and Update Manifests

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      ##################################################
      # Checkout
      ##################################################
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      ##################################################
      # Setup Java
      ##################################################
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      ##################################################
      # Build Backend
      ##################################################
      - name: Build Backend Jar
        working-directory: backend
        run: mvn clean package -DskipTests

      ##################################################
      # Setup Node
      ##################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      ##################################################
      # AWS Configure
      ##################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##################################################
      # ECR Login
      ##################################################
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ##################################################
      # Backend Docker Build & Push
      ##################################################
      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG} \
            ./backend
            ##################################################
      # Install Trivy
      ##################################################
      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.67.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.67.2_Linux-64bit.deb    

      ##################################################
      # Scan Backend Image
      ##################################################
      - name: Scan Backend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG}

      - name: Push Backend Image
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG}

      ##################################################
      # Frontend Docker Build & Push
      ##################################################
      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG} \
            ./frontend

            ##################################################
      - name: Scan Frontend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG}      

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG}

      ##################################################
      # Update Kustomize (NO sed, NO conflicts)
      ##################################################
      - name: Update Kustomize Image Tags
        run: |
          cd kubernetes/staging

          kustomize edit set image capstone-backend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG}

          kustomize edit set image capstone-frontend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG}

      ##################################################
      # Commit Changes Safely (NO REBASE REQUIRED)
      ##################################################
      - name: Commit Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kubernetes/staging/kustomization.yaml

          git diff --cached --quiet && echo "No manifest changes" && exit 0

          git commit -m "staging: update images ${IMAGE_TAG}"

          git push origin master