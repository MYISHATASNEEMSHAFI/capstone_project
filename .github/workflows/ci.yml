name: Build, Push and Update Manifests

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
        token: ${{ github.token }}
        fetch-depth: 0
        
      # Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Build Backend
      - name: Build Backend Jar
        working-directory: backend
        run: mvn clean package -DskipTests

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install frontend packages
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      # Build frontend
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ##################################################
      # Backend Image
      ##################################################

      - name: Build Backend Docker Image
        run: |
          docker build \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG} \
          ./backend

      - name: Push Backend Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-backend:${IMAGE_TAG}

      ##################################################
      # Frontend Image
      ##################################################

      - name: Build Frontend Docker Image
        run: |
          docker build \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG} \
          ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/capstone-frontend:${IMAGE_TAG}

      ##################################################
      # Update Staging Manifests
      ##################################################

      - name: Update Staging Frontend Image
        run: |
          sed -i "s|capstone-frontend:.*|capstone-frontend:${IMAGE_TAG}|g" kubernetes/staging/frontend-deployment.yaml

      - name: Update Staging Backend Image
        run: |
          sed -i "s|capstone-backend:.*|capstone-backend:${IMAGE_TAG}|g" kubernetes/staging/backend-deployment.yaml

      ##################################################
      # Commit Updated Manifests
      ##################################################

      - name: Commit Manifest Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add kubernetes/staging/frontend-deployment.yaml
          git add kubernetes/staging/backend-deployment.yaml

          git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes"

          git push